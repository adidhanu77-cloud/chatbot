<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPCET Chatbot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; height: 100vh; display: flex; flex-direction: column; }

  .header {
    background: linear-gradient(135deg, #1a3a6b 0%, #0d5c8a 100%);
    color: white;
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .logo-img {
    width: 50px; height: 50px;
    border-radius: 50%;
    background: white;
    object-fit: contain;
    padding: 3px;
    flex-shrink: 0;
  }
  .logo-fallback {
    width: 50px; height: 50px;
    border-radius: 50%;
    background: white;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 13px; color: #1a3a6b;
    flex-shrink: 0;
    display: none;
  }
  .header-info h1 { font-size: 15px; font-weight: 700; line-height: 1.3; }
  .header-info p { font-size: 11px; opacity: 0.85; margin-top: 2px; }
  .status-dot {
    width: 7px; height: 7px;
    background: #4caf50;
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .msg { display: flex; gap: 10px; max-width: 85%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot { align-self: flex-start; }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    overflow: hidden;
  }
  .bot .avatar { background: #1a3a6b; }
  .bot .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .user .avatar { background: #e8f0fe; color: #1a3a6b; font-size: 11px; }

  .bubble {
    padding: 11px 15px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.6;
    max-width: 100%;
  }
  .bot .bubble {
    background: white;
    color: #1a2b4a;
    border-radius: 4px 18px 18px 18px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .user .bubble {
    background: #1a3a6b;
    color: white;
    border-radius: 18px 4px 18px 18px;
  }

  .typing-indicator span {
    display: inline-block;
    width: 7px; height: 7px;
    background: #aaa;
    border-radius: 50%;
    margin: 0 2px;
    animation: bounce 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-8px)} }

  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 16px 12px;
  }
  .qr-btn {
    background: white;
    border: 1.5px solid #1a3a6b;
    color: #1a3a6b;
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .qr-btn:hover { background: #1a3a6b; color: white; }

  .input-area {
    background: white;
    border-top: 1px solid #e0e6f0;
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .input-area input {
    flex: 1;
    border: 1.5px solid #d0daea;
    border-radius: 24px;
    padding: 10px 16px;
    font-size: 14px;
    outline: none;
    font-family: inherit;
    transition: border 0.2s;
  }
  .input-area input:focus { border-color: #1a3a6b; }
  .send-btn {
    width: 42px; height: 42px;
    background: #1a3a6b;
    color: white;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
    font-size: 18px;
  }
  .send-btn:hover { background: #0d5c8a; }
  .send-btn:active { transform: scale(0.94); }

  .source-tag {
    font-size: 11px;
    color: #888;
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #c5cfe0; border-radius: 10px; }
</style>
</head>
<body>

<div class="header">
  <img class="logo-img" id="collegeLogo"
    src="https://epcet.edu.in/wp-content/uploads/2022/01/epcet-logo.png"
    alt="EPCET Logo"
    onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='flex';" />
  <div class="logo-fallback" id="logoFallback">EPCET</div>
  <div class="header-info">
    <h1>East Point College of Engineering and Technology</h1>
    <p><span class="status-dot"></span>AI Assistant &middot; Online</p>
  </div>
</div>

<div class="chat-area" id="chatArea"></div>

<div class="quick-replies" id="quickReplies">
  <button class="qr-btn" onclick="sendQuick('Tell me about admissions process at EPCET')">🎓 Admissions</button>
  <button class="qr-btn" onclick="sendQuick('What is the fee structure at EPCET?')">💰 Fee Structure</button>
  <button class="qr-btn" onclick="sendQuick('What courses are offered at EPCET?')">📚 Courses</button>
  <button class="qr-btn" onclick="sendQuick('Tell me about campus facilities at EPCET')">🏫 Campus</button>
  <button class="qr-btn" onclick="sendQuick('Contact and location details of EPCET')">📞 Contact</button>
  <button class="qr-btn" onclick="sendQuick('What scholarships are available at EPCET?')">🏆 Scholarships</button>
</div>

<div class="input-area">
  <input type="text" id="userInput" placeholder="Ask about admissions, fees, courses..." onkeydown="if(event.key==='Enter') sendMsg()" />
  <button class="send-btn" onclick="sendMsg()" title="Send">&#10148;</button>
</div>

<script>
const chatArea = document.getElementById('chatArea');
const userInput = document.getElementById('userInput');

const SYSTEM_PROMPT = `You are the official AI Assistant for East Point College of Engineering and Technology (EPCET), Bangalore. You help students, parents, and visitors with queries about:

- Admissions: eligibility, process, important dates, entrance exams (KCET, COMEDK, JEE Main), documents required
- Fee structure: tuition fees, hostel fees, lab fees, scholarships, payment plans
- Courses: BE, M.Tech, MBA, MCA, PhD programs — departments include CSE, ECE, ME, CE, EEE, IT, AI & ML, AI & Data Science, ISE, CSE (IoT/Cyber Security/Blockchain)
- Campus: 75-acre campus, labs, library, sports, hostel, transport, canteen, auditorium
- Placements: top recruiters like Amazon, Bosch, IBM, Virtusa, Salesforce; highest package 33 LPA, average 7.5 LPA
- Contact: Jnana Prabha, East Point Campus, Virgo Nagar Post, Avalahalli, Bengaluru, Karnataka 560049. Phone: +91 80 2847 2999. Website: www.eastpoint.ac.in
- Scholarships: East Point Merit Scholarship (EPSAT), government scholarships, KCET/JEE merit-based
- Rankings: Ranked 36th by Outlook-ICARE 2025 (Engineering Private), 40th by TOI for B.Tech
- Affiliations: Affiliated to VTU, approved by AICTE, accredited by NBA and NAAC (Grade A), Autonomous status

Be friendly, helpful, and concise. Use plain text responses — do not use markdown symbols like asterisks, hashes, or bullet dashes. Use numbered lists or plain line breaks to structure information. Keep responses clear and under 200 words unless needed. Always encourage prospective students warmly.`;

let history = [];
let isTyping = false;

function formatText(text) {
  return text
    .replace(/#{1,6}\s*/g, '')
    .replace(/\*\*(.*?)\*\*/g, '$1')
    .replace(/\*(.*?)\*/g, '$1')
    .replace(/`(.*?)`/g, '$1')
    .replace(/\n/g, '<br>');
}

function addMsg(role, text, isWeb) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';

  if (role === 'bot') {
    const img = document.createElement('img');
    img.src = 'https://epcet.edu.in/wp-content/uploads/2022/01/epcet-logo.png';
    img.alt = 'EPCET';
    img.onerror = () => { avatar.textContent = 'EP'; avatar.style.color = 'white'; avatar.style.fontSize = '11px'; };
    avatar.appendChild(img);
  } else {
    avatar.textContent = 'You';
    avatar.style.color = '#1a3a6b';
  }

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = formatText(text);

  if (isWeb) {
    const src = document.createElement('div');
    src.className = 'source-tag';
    src.innerHTML = '🌐 Web-powered response';
    bubble.appendChild(src);
  }

  div.appendChild(avatar);
  div.appendChild(bubble);
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  return div;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typingIndicator';
  div.innerHTML = `<div class="avatar" style="background:#1a3a6b;color:white;font-size:11px;">EP</div><div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

async function callClaude(userMsg) {
  history.push({ role: 'user', content: userMsg });

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      system: SYSTEM_PROMPT,
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      messages: history
    })
  });

  const data = await response.json();
  let fullText = '';
  let usedWeb = false;

  if (data.content) {
    for (const block of data.content) {
      if (block.type === 'text') fullText += block.text;
      if (block.type === 'tool_use') usedWeb = true;
    }
  }

  if (!fullText && data.stop_reason === 'tool_use') {
    const toolResults = [];
    for (const block of data.content) {
      if (block.type === 'tool_use') {
        toolResults.push({ type: 'tool_result', tool_use_id: block.id, content: 'Search completed.' });
      }
    }
    const messages2 = [...history, { role: 'assistant', content: data.content }, { role: 'user', content: toolResults }];
    const resp2 = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: messages2
      })
    });
    const data2 = await resp2.json();
    if (data2.content) {
      for (const block of data2.content) {
        if (block.type === 'text') fullText += block.text;
      }
    }
    usedWeb = true;
  }

  const reply = fullText || 'Sorry, I could not process that. Please try again.';
  history.push({ role: 'assistant', content: reply });
  return { text: reply, usedWeb };
}

async function sendMsg() {
  const msg = userInput.value.trim();
  if (!msg || isTyping) return;
  userInput.value = '';
  isTyping = true;

  addMsg('user', msg, false);
  showTyping();

  try {
    const { text, usedWeb } = await callClaude(msg);
    removeTyping();
    addMsg('bot', text, usedWeb);
  } catch (err) {
    removeTyping();
    addMsg('bot', 'Sorry, I encountered an error. Please try again.', false);
  }

  isTyping = false;
}

function sendQuick(msg) {
  userInput.value = msg;
  sendMsg();
}

window.onload = () => {
  addMsg('bot', 'Welcome to East Point College of Engineering and Technology (EPCET)!\n\nI am your AI assistant, here to help you with:\n\n1. Admissions and eligibility\n2. Fee structure and scholarships\n3. Courses and departments\n4. Campus facilities\n5. Placements and recruiters\n\nHow can I assist you today? Use the quick buttons below or type your question!', false);
};
</script>
</body>
</html>
